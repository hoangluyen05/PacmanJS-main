<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man</title>

    <style>
        #gameCanvas {
            box-shadow: 10px 10px 20px black;
        }

        h1 {
            text-align: center;
            font-family: comic sans MS;
            color: lightgrey;
        }

        #mode {
            text-align: center;
            color: white;
            font-family: Arial;
            margin-bottom: 10px;
        }

        body {
            display: flex;
            justify-content: center;
            overflow: hidden;
            height: 100vh;
            background: linear-gradient(
                0deg,
                rgb(17, 51, 161) 0%,
                rgb(136, 34, 195) 100%
            );
        }

        .box-button {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
        }

        #pause-game {
            background-color: #4CAF50;
        }

        #btn-manhattan {
            background-color: #2196F3;
        }

        #btn-bfs {
            background-color: #FF5722;
        }

        #btn-weighted {
            background-color: #9C27B0;
        }
    </style>
</head>

<body>
    <div>
        <h1>Pac-Man</h1>

        <!-- HIỂN THỊ MODE -->
        <h2 id="mode">Mode: MANHATTAN</h2>
        <div id="stats" style="color:white; text-align:center; margin-bottom:10px;">
    Nodes: 0 | Path: 0 | Time: 0 ms    <!--Số node đã duyệt | Độ dài đường đi tìm được | Thời gian tính toán đường đi -->
</div>

        <!-- NÚT ĐIỀU KHIỂN -->
        <div class="box-button">
            <button id="pause-game">Pause</button>
            <button id="btn-manhattan">Manhattan</button>
            <button id="btn-weighted">Weighted</button>
            <button id="btn-bfs">BFS</button>
        </div>

        <!-- GAME -->
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module" src="src/Game.js"></script>
</body>

</html>
